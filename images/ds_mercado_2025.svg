<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="100%" style="stop-color:#00C9A7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="100%" style="stop-color:#00C9A7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" rx="16" fill="#0F0F1A"/>
  <rect width="900" height="5" rx="2" fill="url(#g2)"/>

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="white">Data Science — Mercado Laboral 2025–2026</text>

  <!-- Card 1: Growth -->
  <rect x="30" y="70" width="190" height="180" rx="14" fill="#1A1A2E"/>
  <rect x="30" y="70" width="190" height="5" rx="2" fill="#6C3CE1"/>
  <text x="125" y="122" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="900" fill="url(#g1)">34%</text>
  <text x="125" y="148" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#AAA">crecimiento proyectado</text>
  <text x="125" y="164" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#AAA">2024–2034</text>
  <text x="125" y="195" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#666">Bureau of Labor Statistics</text>
  <text x="125" y="212" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#666">4° carrera más demandada 🇺🇸</text>
  <text x="125" y="235" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#555">Promedio industria: 4%</text>

  <!-- Card 2: Salary -->
  <rect x="245" y="70" width="190" height="180" rx="14" fill="#1A1A2E"/>
  <rect x="245" y="70" width="190" height="5" rx="2" fill="#00C9A7"/>
  <text x="340" y="118" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="36" font-weight="900" fill="url(#g1)">$122K</text>
  <text x="340" y="142" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#AAA">salario base promedio</text>
  <text x="340" y="160" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#AAA">Data Scientist — EE.UU.</text>
  <text x="340" y="188" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#666">Entry level: $152K</text>
  <text x="340" y="205" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#666">Senior: hasta $218K</text>
  <text x="340" y="235" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#555">Fuente: Syracuse iSchool 2026</text>

  <!-- Card 3: Data volume -->
  <rect x="460" y="70" width="190" height="180" rx="14" fill="#1A1A2E"/>
  <rect x="460" y="70" width="190" height="5" rx="2" fill="#8B5CF6"/>
  <text x="555" y="115" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="32" font-weight="900" fill="url(#g1)">402M</text>
  <text x="555" y="138" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#AAA">terabytes generados</text>
  <text x="555" y="155" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#AAA">cada día en 2025</text>
  <text x="555" y="183" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#666">181 zettabytes/año</text>
  <text x="555" y="200" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#666">90% creado en últimos 2 años</text>
  <text x="555" y="235" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#555">techbusinessnews.com.au</text>

  <!-- Card 4: Demand gap -->
  <rect x="675" y="70" width="190" height="180" rx="14" fill="#1A1A2E"/>
  <rect x="675" y="70" width="190" height="5" rx="2" fill="#F59E0B"/>
  <text x="770" y="118" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="42" font-weight="900" fill="url(#g1)">50%</text>
  <text x="770" y="144" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#AAA">más demanda que oferta</text>
  <text x="770" y="162" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#AAA">de Data Scientists en 2026</text>
  <text x="770" y="190" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#666">+22% salario para quienes</text>
  <text x="770" y="207" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#666">dominan Python + análisis</text>
  <text x="770" y="235" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#555">LinkedIn Workforce Report 2025</text>

  <!-- Bottom section: companies -->
  <text x="450" y="290" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="#888">Empresas que usan Python para Data Science:</text>

  <rect x="60" y="308" width="120" height="36" rx="8" fill="#1A1A2E"/>
  <text x="120" y="331" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#E50914">Netflix</text>

  <rect x="205" y="308" width="120" height="36" rx="8" fill="#1A1A2E"/>
  <text x="265" y="331" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#1DB954">Spotify</text>

  <rect x="350" y="308" width="120" height="36" rx="8" fill="#1A1A2E"/>
  <text x="410" y="331" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#4285F4">Google</text>

  <rect x="495" y="308" width="120" height="36" rx="8" fill="#1A1A2E"/>
  <text x="555" y="331" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#000000" stroke="#AAA" stroke-width="0.3">Uber</text>
  <text x="555" y="331" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#AAAAAA">Uber</text>

  <rect x="640" y="308" width="120" height="36" rx="8" fill="#1A1A2E"/>
  <text x="700" y="331" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#E1306C">Instagram</text>

  <rect x="785" y="308" width="80" height="36" rx="8" fill="#1A1A2E"/>
  <text x="825" y="331" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#721422">NASA</text>
</svg>
