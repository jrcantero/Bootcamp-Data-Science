<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="100%" style="stop-color:#00C9A7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6C3CE1" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="900" height="420" rx="16" fill="#0F0F1A"/>
  <rect width="900" height="5" rx="2" fill="url(#cg)"/>

  <text x="450" y="44" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="white">Ciclo de Vida de un Proyecto de Data Science</text>

  <!-- Center circle -->
  <circle cx="450" cy="230" r="52" fill="#1A1A2E" stroke="url(#cg)" stroke-width="2.5"/>
  <text x="450" y="224" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="white">Data</text>
  <text x="450" y="242" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="url(#cg)">Science</text>

  <!-- Step 1: Definir problema — top -->
  <circle cx="450" cy="90" r="42" fill="#1A1A2E" stroke="#6C3CE1" stroke-width="2"/>
  <text x="450" y="85" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20">🎯</text>
  <text x="450" y="104" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="white">1. Definir</text>
  <text x="450" y="118" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#AAA">el problema</text>

  <!-- Step 2: Recolectar — top right -->
  <circle cx="640" cy="148" r="42" fill="#1A1A2E" stroke="#7B4DE6" stroke-width="2"/>
  <text x="640" y="143" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20">🗄️</text>
  <text x="640" y="162" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="white">2. Recolectar</text>
  <text x="640" y="176" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#AAA">datos</text>

  <!-- Step 3: Limpiar/EDA — bottom right -->
  <circle cx="640" cy="312" r="42" fill="#1A1A2E" stroke="#3B9DE0" stroke-width="2"/>
  <text x="640" y="307" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20">🔍</text>
  <text x="640" y="326" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="white">3. Limpiar</text>
  <text x="640" y="340" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#AAA">y explorar (EDA)</text>

  <!-- Step 4: Modelar — bottom -->
  <circle cx="450" cy="370" r="42" fill="#1A1A2E" stroke="#00C9A7" stroke-width="2"/>
  <text x="450" y="365" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20">🤖</text>
  <text x="450" y="384" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="white">4. Modelar</text>
  <text x="450" y="398" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#AAA">Machine Learning</text>

  <!-- Step 5: Comunicar — bottom left -->
  <circle cx="260" cy="312" r="42" fill="#1A1A2E" stroke="#10B981" stroke-width="2"/>
  <text x="260" y="307" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20">📊</text>
  <text x="260" y="326" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="white">5. Comunicar</text>
  <text x="260" y="340" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#AAA">resultados</text>

  <!-- Step 6: Desplegar — top left -->
  <circle cx="260" cy="148" r="42" fill="#1A1A2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="260" y="143" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20">🚀</text>
  <text x="260" y="162" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="white">6. Desplegar</text>
  <text x="260" y="176" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#AAA">en producción</text>

  <!-- Arrows between steps (curved) -->
  <path d="M480,100 Q570,100 610,135" fill="none" stroke="#6C3CE1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M640,192 Q640,252 640,270" fill="none" stroke="#7B4DE6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M610,345 Q530,380 494,375" fill="none" stroke="#3B9DE0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M408,375 Q328,378 300,347" fill="none" stroke="#00C9A7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M260,270 Q260,215 260,192" fill="none" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M290,135 Q368,100 408,97" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)" opacity="0.7"/>
</svg>
